name: Build Sony Camera APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Hide Modern SDKs
      run: |
        # Clear out modern tools that confuse the legacy compiler
        rm -rf $ANDROID_SDK_ROOT/platforms/android-3*
        rm -rf $ANDROID_SDK_ROOT/build-tools/3*
        rm -rf $ANDROID_SDK_ROOT/cmdline-tools

    - name: Create local.properties
      run: |
        # Point to the vintage NDK pre-installed on the runner
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/21.4.7075529" > local.properties
        echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

    - name: Build APK
      run: |
        # We use ./gradlew (the project's own Gradle) to avoid the version conflict
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Sony-JPGCookbook-NDK
        path: app/build/outputs/apk/debug/*.apk